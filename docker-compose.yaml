services:
  db:
    image: mysql:8
    container_name: oneohone-devops-mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=devopsdb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: oneohone-devops-backend
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    environment:
      - DATABASE_URL=mysql://root:password@db:3306/devopsdb
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: oneohone-devops-frontend
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api
    ports:
      - "3001:3001"       