name: Deploy to GCP

# This workflow triggers on pushes to the master branch
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Connect to our cloud server and deploy
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}  # Only needed if private key has passphrase
          script: |
            cd ~/101-DevOps || git clone https://github.com/MohamedElaassal/101-DevOps.git
            cd ~/101-DevOps
            git pull origin master
            docker compose down
            docker compose up -d --build
